<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Password Strength Analyzer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000000; /* BLACK BACKGROUND */
        }

        .container {
            max-width: 420px;
            margin: 90px auto;
            padding: 28px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(255,255,255,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #111;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 11px;
            margin-bottom: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #444;
            margin-bottom: 18px;
        }

        button {
            width: 100%;
            padding: 11px;
            background-color: #111;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background-color: #333;
        }

        .result {
            margin-top: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

       .circle {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: bold;
    color: white; 
}


        .details p {
            margin: 4px 0;
            font-size: 14px;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #777;
            margin-top: 18px;
        }
    </style>

    <script>
        function togglePassword() {
            const input = document.getElementById("password");
            input.type = input.type === "password" ? "text" : "password";
        }
    </script>
</head>

<body>

<div class="container">

    <h2>Password Strength Analyzer</h2>

    <form action="/analyze" method="post">
        <input type="password" id="password" name="password"
               placeholder="Enter password" required>

        <div class="toggle">
            <input type="checkbox" onclick="togglePassword()"> Show password
        </div>

        <button type="submit">Analyze</button>
    </form>

    <!-- RESULT SECTION -->
    <div th:if="${strength}" class="result">

        <!-- CIRCULAR INDICATOR -->
       <div class="circle"
     th:style="
     ${strength == 'Weak'} ? 
     'background: conic-gradient(#bdbdbd 90deg, #e5e5e5 0deg); color:#111;' :
     (${strength == 'Moderate'} ? 
     'background: conic-gradient(#6b7280 180deg, #d1d5db 0deg); color:white;' :
     'background: conic-gradient(#111827 270deg, #d1d5db 0deg); color:white;')">
    <span th:text="${strength}"></span>
</div>


        <!-- DETAILS -->
        <div class="details">
            <p><strong>Strength:</strong> <span th:text="${strength}"></span></p>
            <p><strong>Entropy:</strong> <span th:text="${entropy}"></span> bits</p>
        </div>

    </div>

    <div class="footer">
        Built with Spring Boot
    </div>

</div>

</body>
</html>
